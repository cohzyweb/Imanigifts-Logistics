<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Quote – Imani Gift Logistics</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <div class="container header-wrapper">
        <div class="logo">
            <img src="Imani_Logistics_1.png" alt="Imani Gift Logistics logo">
        </div>

        <nav class="nav">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Services</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <div class="auth-buttons">
            <a href="quote.html" class="btn btn-outline active">Get a Quote</a>
            <a href="track.html" class="btn btn-primary">Track Shipment</a>
        </div>
    </div>
</header>

<!-- ================= FORM ================= -->
<section class="quote-section">
<div class="container">

<h2 class="section-title">Request Your Instant Quote</h2>

<div class="quote-form-card">
<form id="quoteForm">

<div class="form-grid">

<!-- BASIC -->
<div class="form-group">
<label>Full Name *</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email *</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone *</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Service *</label>
<select required>
<option>Home Moves</option>
<option>Office Moves</option>
<option>Freight</option>
</select>
</div>

<div class="form-group">
<label>Origin *</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Destination *</label>
<input type="text" required>
</div>

<div class="form-group form-full">
<label>Cargo Description</label>
<textarea></textarea>
</div>

<!-- ================= NEW SECTION ================= -->

<div class="form-group form-full">
<h3>Moving & Logistics Questionnaire</h3>
<p>Please complete the details below</p>
</div>

<!-- Packing -->
<div class="form-group">
<label>Packing Responsibility</label>
<select>
<option>Self pack</option>
<option>Need packing service</option>
</select>
</div>

<div class="form-group">
<label>Materials Needed</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Furniture Disassembly</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group form-full">
<label>Fragile Items</label>
<textarea></textarea>
</div>

<!-- Access -->
<div class="form-group">
<label>Floor Levels</label>
<input type="text">
</div>

<div class="form-group">
<label>Elevator</label>
<select>
<option>None</option>
<option>Passenger</option>
<option>Freight</option>
</select>
</div>

<div class="form-group">
<label>Parking</label>
<select>
<option>Driveway</option>
<option>Street</option>
</select>
</div>

<div class="form-group">
<label>Walking Distance >20m</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group form-full">
<label>Tight Spaces</label>
<textarea></textarea>
</div>

<!-- Support -->
<div class="form-group">
<label>Supervisor Present</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Extra Help</label>
<select>
<option>Full service</option>
<option>Partial help</option>
</select>
</div>

<div class="form-group">
<label>Appliances Help</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

<!-- Inventory -->
<div class="form-group">
<label>Boxes Count</label>
<input type="number">
</div>

<div class="form-group form-full">
<label>Bulky Items</label>
<textarea></textarea>
</div>

<div class="form-group">
<label>Timing</label>
<input type="text">
</div>

<div class="form-group">
<label>Storage Needed</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

</div>

<!-- SUBMIT -->
<div class="submit-area">
<button class="btn btn-primary btn-large">
Get My Quote
</button>
</div>

</form>
</div>

</div>
</section>

</body>
</html>
```
